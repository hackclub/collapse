name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS (universal binary for both Intel and Apple Silicon)
          - platform: macos-latest
            args: --target universal-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
            os_label: macos
          # Linux
          - platform: ubuntu-24.04
            args: ""
            rust_targets: ""
            os_label: linux
          - platform: ubuntu-24.04-arm
            args: ""
            rust_targets: ""
            os_label: linux
          # Windows
          - platform: windows-latest
            args: ""
            rust_targets: ""
            os_label: windows
          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc
            rust_targets: aarch64-pc-windows-msvc
            os_label: windows

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libx11-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev \
            libpipewire-0.3-dev \
            libgstreamer1.0-dev \
            libgstreamer-plugins-base1.0-dev \
            libgbm-dev \
            xdg-utils \
            rpm \
            zstd

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./clients/desktop/src-tauri -> target"
          shared-key: release-${{ matrix.platform }}-${{ matrix.args || 'native' }}

      - name: Install dependencies
        run: npm ci

      - name: Build workspace dependencies
        run: |
          npm run build -w packages/shared
          npm run build -w clients/react

      - name: Build app (with signing)
        if: startsWith(github.ref, 'refs/tags/v')
        run: npm run tauri build -- ${{ matrix.args }}
        working-directory: clients/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}

      - name: Build app (without signing)
        if: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        run: npm run tauri build -- ${{ matrix.args }}
        working-directory: clients/desktop
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Arch Linux package (.pkg.tar.zst)
        if: runner.os == 'Linux'
        run: |
          if [ -d "clients/desktop/src-tauri/target/release/bundle/deb" ]; then
            cd clients/desktop/src-tauri/target/release/bundle/deb
            for deb in *.deb; do
              if [ -f "$deb" ]; then
                echo "Building Arch package from $deb"
                DEB_FILE=$(basename "$deb")
                
                # Extract version from deb file name (e.g., collapse_0.0.22_amd64.deb -> 0.0.22)
                PKGVER=$(echo "$DEB_FILE" | grep -oP '([0-9]+\.[0-9]+\.[0-9]+)' | head -1)
                PKGVER=${PKGVER:-1.0.0}
                
                # Determine architecture
                if [[ "$DEB_FILE" == *"arm64"* || "$DEB_FILE" == *"aarch64"* ]]; then
                  ARCH="aarch64"
                else
                  ARCH="x86_64"
                fi
                
                mkdir -p arch_pkg
                cd arch_pkg
                ar x "../$DEB_FILE"
                
                if [ -f "data.tar.xz" ]; then
                  tar -xf data.tar.xz
                elif [ -f "data.tar.gz" ]; then
                  tar -xf data.tar.gz
                fi
                
                rm -f data.tar.* control.tar.* debian-binary
                
                SIZE=$(du -sb . | awk '{print $1}')
                
                echo "pkgname = collapse-bin" > .PKGINFO
                echo "pkgver = ${PKGVER}-1" >> .PKGINFO
                echo "pkgdesc = Collapse desktop app" >> .PKGINFO
                echo "url = https://github.com/anscg/collapse" >> .PKGINFO
                echo "builddate = $(date +%s)" >> .PKGINFO
                echo "packager = GitHub Actions" >> .PKGINFO
                echo "size = ${SIZE}" >> .PKGINFO
                echo "arch = ${ARCH}" >> .PKGINFO
                echo "license = MIT" >> .PKGINFO
                echo "depend = cairo" >> .PKGINFO
                echo "depend = desktop-file-utils" >> .PKGINFO
                echo "depend = gdk-pixbuf2" >> .PKGINFO
                echo "depend = glib2" >> .PKGINFO
                echo "depend = gtk3" >> .PKGINFO
                echo "depend = hicolor-icon-theme" >> .PKGINFO
                echo "depend = libsoup" >> .PKGINFO
                echo "depend = pango" >> .PKGINFO
                echo "depend = webkit2gtk-4.1" >> .PKGINFO
                
                tar --zstd -cf "../collapse_${PKGVER}_${ARCH}.pkg.tar.zst" .PKGINFO *
                cd ..
                rm -rf arch_pkg
              fi
            done
          fi

      - name: Sign Windows binaries with Trusted Signing
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows' && !contains(matrix.args, 'aarch64')
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: hackclub
          certificate-profile-name: hackatime-desktop
          files-folder: ${{ github.workspace }}/clients/desktop/src-tauri/target/release/bundle
          files-folder-filter: msi,exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Sign Windows ARM binaries with Trusted Signing
        if: startsWith(github.ref, 'refs/tags/v') && runner.os == 'Windows' && contains(matrix.args, 'aarch64')
        uses: azure/trusted-signing-action@v0.5.1
        with:
          azure-tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          azure-client-id: ${{ secrets.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.AZURE_CLIENT_SECRET }}
          endpoint: https://eus.codesigning.azure.net/
          trusted-signing-account-name: hackclub
          certificate-profile-name: hackatime-desktop
          files-folder: ${{ github.workspace }}/clients/desktop/src-tauri/target/aarch64-pc-windows-msvc/release/bundle
          files-folder-filter: msi,exe
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.args || 'native' }}
          path: |
            clients/desktop/src-tauri/target/*/release/bundle/**/*.dmg
            clients/desktop/src-tauri/target/*/release/bundle/**/*.app.tar.gz
            clients/desktop/src-tauri/target/release/bundle/**/*.dmg
            clients/desktop/src-tauri/target/release/bundle/**/*.app.tar.gz
            clients/desktop/src-tauri/target/release/bundle/**/*.AppImage
            clients/desktop/src-tauri/target/release/bundle/**/*.deb
            clients/desktop/src-tauri/target/release/bundle/**/*.rpm
            clients/desktop/src-tauri/target/release/bundle/**/*.msi
            clients/desktop/src-tauri/target/release/bundle/**/*.exe
            clients/desktop/src-tauri/target/*/release/bundle/**/*.msi
            clients/desktop/src-tauri/target/*/release/bundle/**/*.exe
            clients/desktop/src-tauri/target/release/bundle/**/*.pkg.tar.zst

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Display artifacts
        run: ls -R artifacts

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Rename artifacts with OS labels
        run: |
          mkdir -p release-assets
          find artifacts -type f \( \
            -name "*.dmg" -o \
            -name "*.app.tar.gz" -o \
            -name "*.AppImage" -o \
            -name "*.deb" -o \
            -name "*.rpm" -o \
            -name "*.msi" -o \
            -name "*.exe" -o \
            -name "*.pkg.tar.zst" \
          \) | while read -r file; do
            FILENAME=$(basename "$file")
            # Determine OS label from artifact directory
            case "$file" in
              *macos*) OS="macos" ;;
              *ubuntu*) OS="linux" ;;
              *windows*) OS="windows" ;;
              *) OS="unknown" ;;
            esac
            # Normalize RPM names to match underscore convention used by other artifacts
            # Collapse-0.0.16-1.x86_64.rpm -> Collapse_0.0.16_x86_64.rpm
            if [[ "$FILENAME" == *.rpm ]]; then
              # Strip "Collapse-", version, release number; extract arch
              RPM_REST="${FILENAME#Collapse-}"       # 0.0.16-1.x86_64.rpm
              RPM_VER="${RPM_REST%%-[0-9].*}"        # 0.0.16
              RPM_ARCH="${RPM_REST##*-[0-9].}"       # x86_64.rpm
              FILENAME="Collapse_${RPM_VER}_${RPM_ARCH}"
            fi
            # Add OS label: Collapse_0.0.16_x64-setup.exe -> Collapse_linux-0.0.16_x64-setup.exe
            if [[ "$FILENAME" == *"_"* ]] && [[ "$FILENAME" != *"${OS}-"* ]]; then
              PREFIX="${FILENAME%%_*}"
              SUFFIX="${FILENAME#*_}"
              NEW_NAME="${PREFIX}_${OS}-${SUFFIX}"
            else
              NEW_NAME="$FILENAME"
            fi
            echo "Renaming: $FILENAME -> $NEW_NAME"
            cp "$file" "release-assets/$NEW_NAME"
          done
          ls -la release-assets/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          VERSION="${TAG#v}"

          # Create draft release
          gh release create "$TAG" \
            --title "Collapse v${VERSION}" \
            --notes "See the assets to download and install." \
            --draft

          # Upload all renamed artifacts
          for file in release-assets/*; do
            echo "Uploading: $file"
            gh release upload "$TAG" "$file" --clobber
          done
