name: Release Desktop App

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  release:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS
          - platform: macos-latest
            args: --target aarch64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          - platform: macos-latest
            args: --target x86_64-apple-darwin
            rust_targets: aarch64-apple-darwin,x86_64-apple-darwin
          # Linux
          - platform: ubuntu-22.04
            args: ""
            rust_targets: ""
          - platform: ubuntu-24.04-arm
            args: ""
            rust_targets: ""
          # Windows
          - platform: windows-latest
            args: ""
            rust_targets: ""
          - platform: windows-latest
            args: --target aarch64-pc-windows-msvc
            rust_targets: aarch64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libx11-dev \
            libxcb-randr0-dev \
            libxcb-shm0-dev

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: lts/*
          cache: npm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@631a55b12751854ce901bb631d5902ceb48146f7 # stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Rust cache
        uses: swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: "./clients/desktop/src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build workspace dependencies
        run: |
          npm run build -w packages/shared
          npm run build -w clients/react

      - name: Build and release
        uses: tauri-apps/tauri-action@84b9d35b5fc46c1e45415bdb6144030364f7ebc5 # v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: "./clients/desktop"
          tagName: v__VERSION__
          releaseName: "Collapse v__VERSION__"
          releaseBody: "See the assets to download and install."
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
